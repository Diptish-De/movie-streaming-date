<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Watch Party Room</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap"
        rel="stylesheet">
    <script src="/socket.io/socket.io.js"></script>
    <style>
        :root {
            --bg: #060612;
            --bg2: #0f0f24;
            --bg3: #181838;
            --accent: #e50914;
            --accent2: #ff6b35;
            --text: #f0f0f5;
            --text2: #8888aa;
            --text3: #5c5c7a;
            --border: rgba(255, 255, 255, 0.06);
            --glow: rgba(229, 9, 20, 0.25);
            --success: #00c853;
            --radius: 16px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: var(--text);
            height: 100vh;
            overflow: hidden;
        }

        /* ===== LAYOUT ===== */
        .app {
            display: flex;
            height: 100vh;
            flex-direction: column;
        }

        .topbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px 20px;
            background: rgba(15, 15, 36, 0.95);
            border-bottom: 1px solid var(--border);
            z-index: 20;
            flex-shrink: 0;
        }

        .topbar-left {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .topbar-logo {
            font-size: 18px;
            font-weight: 800;
            background: linear-gradient(135deg, var(--accent), var(--accent2));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .room-badge {
            padding: 4px 10px;
            background: rgba(229, 9, 20, 0.12);
            border-radius: 6px;
            font-size: 12px;
            font-weight: 700;
            color: var(--accent);
            letter-spacing: 2px;
            cursor: pointer;
        }

        .topbar-right {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .users-pill {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 5px 12px;
            background: var(--bg3);
            border-radius: 20px;
            font-size: 12px;
            color: var(--text2);
        }

        .users-dot {
            width: 7px;
            height: 7px;
            background: var(--success);
            border-radius: 50%;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {

            0%,
            100% {
                opacity: 1
            }

            50% {
                opacity: 0.4
            }
        }

        .share-btn {
            padding: 7px 14px;
            background: linear-gradient(135deg, var(--accent), #b20710);
            border: none;
            border-radius: 8px;
            color: white;
            font-size: 12px;
            font-weight: 600;
            font-family: 'Inter';
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 5px;
            transition: all 0.2s;
        }

        .share-btn:hover {
            box-shadow: 0 4px 15px var(--glow);
        }

        /* ===== MAIN BODY ===== */
        .main-body {
            display: flex;
            flex: 1;
            overflow: hidden;
        }

        /* ===== VIDEO AREA ===== */
        .video-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: #000;
            position: relative;
        }

        .video-player {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }

        #mainVideo {
            width: 100%;
            height: 100%;
            object-fit: contain;
            background: #000;
        }

        /* Drop zone / load screen */
        .video-loader {
            position: absolute;
            inset: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 20px;
            background: rgba(6, 6, 18, 0.95);
            z-index: 5;
            transition: opacity 0.4s;
        }

        .video-loader.hidden {
            opacity: 0;
            pointer-events: none;
        }

        .loader-icon {
            font-size: 64px;
            margin-bottom: 8px;
        }

        .loader-title {
            font-size: 22px;
            font-weight: 800;
            color: var(--text);
        }

        .loader-sub {
            font-size: 14px;
            color: var(--text2);
            text-align: center;
            max-width: 400px;
            line-height: 1.6;
        }

        .loader-actions {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            justify-content: center;
            margin-top: 8px;
        }

        .loader-btn {
            padding: 14px 28px;
            border-radius: 12px;
            font-size: 14px;
            font-weight: 600;
            font-family: 'Inter';
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: all 0.2s;
            border: none;
        }

        .loader-btn:hover {
            transform: translateY(-2px);
        }

        .loader-btn-primary {
            background: linear-gradient(135deg, var(--accent), #b20710);
            color: white;
            box-shadow: 0 4px 20px var(--glow);
        }

        .loader-btn-secondary {
            background: var(--bg3);
            color: var(--text);
            border: 1px solid var(--border);
        }

        .url-input-wrap {
            display: none;
            width: 100%;
            max-width: 500px;
            flex-direction: column;
            gap: 8px;
            margin-top: 8px;
        }

        .url-input-wrap.show {
            display: flex;
        }

        .url-input {
            width: 100%;
            padding: 12px 16px;
            background: var(--bg3);
            border: 1px solid var(--border);
            border-radius: 10px;
            color: var(--text);
            font-size: 14px;
            font-family: 'Inter';
            outline: none;
        }

        .url-input:focus {
            border-color: rgba(229, 9, 20, 0.4);
        }

        .url-load-btn {
            padding: 10px;
            background: var(--accent);
            border: none;
            border-radius: 8px;
            color: white;
            font-weight: 600;
            cursor: pointer;
            font-family: 'Inter';
        }

        .drop-overlay {
            position: absolute;
            inset: 0;
            background: rgba(229, 9, 20, 0.1);
            border: 3px dashed var(--accent);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 10;
            border-radius: 8px;
        }

        .drop-overlay.active {
            display: flex;
        }

        .drop-overlay span {
            font-size: 20px;
            font-weight: 700;
            color: var(--accent);
        }

        #fileInput {
            display: none;
        }

        /* Sync indicator on video */
        .sync-indicator {
            position: absolute;
            top: 12px;
            left: 12px;
            padding: 6px 14px;
            background: rgba(0, 0, 0, 0.7);
            border-radius: 8px;
            font-size: 12px;
            color: #ff6b6b;
            font-weight: 500;
            opacity: 0;
            transition: opacity 0.3s;
            z-index: 6;
        }

        .sync-indicator.show {
            opacity: 1;
        }

        /* ===== SIDEBAR ===== */
        .sidebar {
            width: 360px;
            background: var(--bg2);
            border-left: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            flex-shrink: 0;
        }

        .sidebar-header {
            padding: 12px 16px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 14px;
            font-weight: 700;
        }

        .sidebar-users {
            display: flex;
            gap: 4px;
            padding: 8px 12px;
            border-bottom: 1px solid var(--border);
            flex-wrap: wrap;
        }

        .user-chip {
            display: flex;
            align-items: center;
            gap: 5px;
            padding: 4px 10px;
            background: var(--bg3);
            border-radius: 16px;
            font-size: 11px;
            font-weight: 500;
        }

        .user-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: var(--success);
        }

        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 10px 14px;
            display: flex;
            flex-direction: column;
            gap: 6px;
            scroll-behavior: smooth;
        }

        .chat-empty {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: var(--text3);
            gap: 6px;
        }

        .chat-empty span {
            font-size: 28px;
        }

        .chat-empty p {
            font-size: 12px;
        }

        .msg {
            display: flex;
            gap: 8px;
            animation: msg-in 0.2s ease;
        }

        @keyframes msg-in {
            from {
                opacity: 0;
                transform: translateY(5px)
            }

            to {
                opacity: 1;
                transform: translateY(0)
            }
        }

        .msg-avatar {
            width: 28px;
            height: 28px;
            min-width: 28px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 11px;
            font-weight: 700;
            color: white;
        }

        .msg-body {
            flex: 1;
            min-width: 0;
        }

        .msg-header {
            display: flex;
            gap: 6px;
            align-items: baseline;
            margin-bottom: 1px;
        }

        .msg-name {
            font-size: 11px;
            font-weight: 600;
        }

        .msg-time {
            font-size: 9px;
            color: var(--text3);
        }

        .msg-text {
            font-size: 12px;
            color: #c8c8e0;
            word-wrap: break-word;
            line-height: 1.5;
        }

        .system-msg {
            text-align: center;
            font-size: 11px;
            color: var(--text3);
            padding: 3px 0;
        }

        .reactions-bar {
            display: flex;
            gap: 2px;
            padding: 6px 10px;
            justify-content: center;
            border-top: 1px solid var(--border);
        }

        .react-btn {
            width: 32px;
            height: 32px;
            border: none;
            background: transparent;
            font-size: 17px;
            cursor: pointer;
            border-radius: 6px;
            transition: all 0.15s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .react-btn:hover {
            background: rgba(255, 255, 255, 0.08);
            transform: scale(1.2);
        }

        .chat-input-area {
            display: flex;
            gap: 6px;
            padding: 10px 12px;
            border-top: 1px solid var(--border);
        }

        .chat-input {
            flex: 1;
            padding: 10px 14px;
            background: var(--bg3);
            border: 1px solid var(--border);
            border-radius: 10px;
            color: var(--text);
            font-size: 12px;
            font-family: 'Inter';
            outline: none;
        }

        .chat-input::placeholder {
            color: var(--text3);
        }

        .chat-input:focus {
            border-color: rgba(229, 9, 20, 0.4);
        }

        .send-btn {
            width: 40px;
            height: 40px;
            border-radius: 10px;
            background: linear-gradient(135deg, var(--accent), #b20710);
            border: none;
            color: white;
            font-size: 16px;
            cursor: pointer;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }

        .send-btn:hover {
            transform: scale(1.05);
        }

        .voice-bar {
            display: flex;
            gap: 6px;
            padding: 8px 10px;
            border-top: 1px solid var(--border);
            background: rgba(15, 15, 36, 0.5);
        }

        .voice-btn {
            flex: 1;
            padding: 8px;
            border-radius: 8px;
            background: var(--bg3);
            border: 1px solid var(--border);
            color: var(--text2);
            font-size: 12px;
            font-family: 'Inter';
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 5px;
            transition: all 0.2s;
        }

        .voice-btn:hover {
            color: var(--text);
        }

        .voice-btn.active {
            background: rgba(0, 200, 83, 0.1);
            border-color: rgba(0, 200, 83, 0.3);
            color: var(--success);
        }

        .mute-btn {
            flex: 0;
            width: 40px;
            display: none;
        }

        /* Float reactions */
        .float-container {
            position: fixed;
            left: 0;
            right: 360px;
            top: 0;
            bottom: 0;
            pointer-events: none;
            z-index: 100;
            overflow: hidden;
        }

        .float-emoji {
            position: absolute;
            bottom: -60px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 3px;
            animation: float-up 3s ease-out forwards;
        }

        .float-emoji-icon {
            font-size: 40px;
            filter: drop-shadow(0 2px 6px rgba(0, 0, 0, 0.5));
        }

        .float-emoji-name {
            font-size: 9px;
            color: white;
            background: rgba(0, 0, 0, 0.6);
            padding: 2px 6px;
            border-radius: 3px;
            font-weight: 600;
        }

        @keyframes float-up {
            0% {
                bottom: 10%;
                opacity: 1;
                transform: scale(0.5) rotate(-5deg);
            }

            20% {
                transform: scale(1.3) rotate(5deg);
                opacity: 1;
            }

            100% {
                bottom: 85%;
                opacity: 0;
                transform: scale(0.7) rotate(-3deg);
            }
        }

        .toast {
            position: fixed;
            top: 60px;
            left: 50%;
            transform: translateX(-50%) translateY(-20px);
            padding: 8px 18px;
            background: rgba(0, 200, 83, 0.15);
            border: 1px solid rgba(0, 200, 83, 0.3);
            border-radius: 8px;
            color: var(--success);
            font-size: 12px;
            font-weight: 500;
            opacity: 0;
            transition: all 0.3s;
            z-index: 2000;
        }

        .toast.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }

        /* Scrollbar */
        .chat-messages::-webkit-scrollbar {
            width: 3px;
        }

        .chat-messages::-webkit-scrollbar-track {
            background: transparent;
        }

        .chat-messages::-webkit-scrollbar-thumb {
            background: rgba(136, 136, 170, 0.3);
            border-radius: 2px;
        }

        /* Mobile */
        @media (max-width: 768px) {
            .main-body {
                flex-direction: column;
            }

            .video-area {
                height: 40vh;
                flex: none;
            }

            .sidebar {
                width: 100%;
                flex: 1;
                border-left: none;
                border-top: 1px solid var(--border);
            }

            .float-container {
                right: 0;
            }
        }
    </style>
</head>

<body>
    <div class="app">
        <!-- Top Bar -->
        <div class="topbar">
            <div class="topbar-left">
                <a href="/" style="text-decoration:none"><span class="topbar-logo">🎬 Watch Party</span></a>
                <span class="room-badge" id="roomBadge" onclick="copyLink()" title="Click to copy link">------</span>
            </div>
            <div class="topbar-right">
                <div class="users-pill">
                    <span class="users-dot"></span>
                    <span id="userCount">0</span> watching
                </div>
                <button class="share-btn" onclick="copyLink()">📤 Share Link</button>
            </div>
        </div>

        <div class="main-body">
            <!-- Video Area -->
            <div class="video-area" id="videoArea">
                <div class="video-player">
                    <video id="mainVideo" controls></video>

                    <!-- Load screen -->
                    <div class="video-loader" id="videoLoader">
                        <div class="loader-icon">🎬</div>
                        <div class="loader-title">Load a Video</div>
                        <div class="loader-sub">Everyone loads the same video file or URL<br>Playback will sync
                            automatically!</div>
                        <div class="loader-actions">
                            <button class="loader-btn loader-btn-primary"
                                onclick="document.getElementById('fileInput').click()">
                                📁 Choose File
                            </button>
                            <button class="loader-btn loader-btn-secondary" id="urlToggleBtn"
                                onclick="toggleUrlInput()">
                                🔗 Paste URL
                            </button>
                        </div>
                        <div class="url-input-wrap" id="urlInputWrap">
                            <input type="text" class="url-input" id="urlInput"
                                placeholder="Paste video URL (.mp4, .mkv, .webm, etc.)">
                            <button class="url-load-btn" onclick="loadUrl()">Load Video</button>
                        </div>
                        <div class="loader-sub" style="font-size:12px;margin-top:12px;color:var(--text3)">
                            Or drag & drop a video file here
                        </div>
                    </div>

                    <!-- Drop overlay -->
                    <div class="drop-overlay" id="dropOverlay">
                        <span>📁 Drop video file here</span>
                    </div>

                    <!-- Sync indicator -->
                    <div class="sync-indicator" id="syncIndicator"></div>
                </div>

                <input type="file" id="fileInput" accept="video/*" onchange="loadFile(event)">
            </div>

            <!-- Chat Sidebar -->
            <div class="sidebar" id="sidebar">
                <div class="sidebar-header">💬 Chat</div>
                <div class="sidebar-users" id="usersBar"></div>
                <div class="chat-messages" id="chatMessages">
                    <div class="chat-empty"><span>💬</span>
                        <p>Say hi!</p>
                    </div>
                </div>
                <div class="reactions-bar">
                    <button class="react-btn" onclick="sendReaction('🔥')">🔥</button>
                    <button class="react-btn" onclick="sendReaction('😂')">😂</button>
                    <button class="react-btn" onclick="sendReaction('😱')">😱</button>
                    <button class="react-btn" onclick="sendReaction('❤️')">❤️</button>
                    <button class="react-btn" onclick="sendReaction('👏')">👏</button>
                    <button class="react-btn" onclick="sendReaction('🥵')">🥵</button>
                    <button class="react-btn" onclick="sendReaction('😍')">😍</button>
                    <button class="react-btn" onclick="sendReaction('💀')">💀</button>
                    <button class="react-btn" onclick="sendReaction('🤯')">🤯</button>
                    <button class="react-btn" onclick="sendReaction('😭')">😭</button>
                </div>
                <div class="chat-input-area">
                    <input type="text" class="chat-input" id="chatInput" placeholder="Type a message..." maxlength="500"
                        autocomplete="off">
                    <button class="send-btn" onclick="sendMessage()">➤</button>
                </div>
                <div class="voice-bar">
                    <button class="voice-btn" id="voiceToggle" onclick="toggleVoice()">
                        <span id="voiceIcon">🎤</span><span id="voiceLabel">Voice Off</span>
                    </button>
                    <button class="voice-btn mute-btn" id="muteToggle" onclick="toggleMute()">
                        <span id="muteIcon">🔊</span>
                    </button>
                </div>
            </div>
        </div>
    </div>

    <div class="float-container" id="floatContainer"></div>
    <div class="toast" id="toast"></div>

    <script>
        // ===== CONFIG =====
        const COLORS = ['#e50914', '#ff6b35', '#00c853', '#2979ff', '#aa00ff', '#ff4081', '#00e5ff', '#ffab00'];
        const urlParts = window.location.pathname.split('/');
        const roomCodeFromUrl = urlParts[urlParts.length - 1];
        const params = new URLSearchParams(window.location.search);
        const nickname = params.get('name') || localStorage.getItem('wp-nickname') || 'Guest';
        const isNewRoom = roomCodeFromUrl === 'NEW';

        let socket = null;
        let users = [];
        let roomCode = '';
        let isRemoteAction = false;
        let lastSyncTime = 0;
        const SYNC_THRESHOLD = 2; // seconds

        // Voice
        let isVoiceActive = false;
        let isMuted = false;
        let localStream = null;
        let peerConnections = new Map();

        // Video
        const video = document.getElementById('mainVideo');

        // ===== VIDEO LOADING =====
        function loadFile(e) {
            const file = e.target.files[0];
            if (!file) return;
            const url = URL.createObjectURL(file);
            video.src = url;
            document.getElementById('videoLoader').classList.add('hidden');
            addSystemMessage('Video loaded: ' + file.name);
        }

        function toggleUrlInput() {
            document.getElementById('urlInputWrap').classList.toggle('show');
        }

        function loadUrl() {
            const url = document.getElementById('urlInput').value.trim();
            if (!url) return;
            video.src = url;
            document.getElementById('videoLoader').classList.add('hidden');
            addSystemMessage('Video loaded from URL');

            // Share URL with others
            if (socket) socket.emit('share-video-url', { url });
        }

        // Drag & drop
        const videoArea = document.getElementById('videoArea');
        const dropOverlay = document.getElementById('dropOverlay');

        videoArea.addEventListener('dragover', (e) => { e.preventDefault(); dropOverlay.classList.add('active'); });
        videoArea.addEventListener('dragleave', () => { dropOverlay.classList.remove('active'); });
        videoArea.addEventListener('drop', (e) => {
            e.preventDefault();
            dropOverlay.classList.remove('active');
            const file = e.dataTransfer.files[0];
            if (file && file.type.startsWith('video/')) {
                video.src = URL.createObjectURL(file);
                document.getElementById('videoLoader').classList.add('hidden');
                addSystemMessage('Video loaded: ' + file.name);
            }
        });

        // ===== VIDEO SYNC =====
        video.addEventListener('play', () => {
            if (isRemoteAction) return;
            if (socket) socket.emit('sync-play', { currentTime: video.currentTime });
        });

        video.addEventListener('pause', () => {
            if (isRemoteAction) return;
            if (socket) socket.emit('sync-pause', { currentTime: video.currentTime });
        });

        video.addEventListener('seeked', () => {
            if (isRemoteAction) return;
            const now = Date.now();
            if (now - lastSyncTime < 500) return;
            lastSyncTime = now;
            if (socket) socket.emit('sync-seek', { currentTime: video.currentTime });
        });

        // ===== SOCKET CONNECTION =====
        function connect() {
            socket = io();

            socket.on('connect', () => {
                if (isNewRoom) {
                    socket.emit('create-room', { nickname }, (res) => {
                        if (res.success) {
                            roomCode = res.roomCode;
                            window.history.replaceState({}, '', '/room/' + roomCode);
                            document.getElementById('roomBadge').textContent = roomCode;
                            document.title = 'Watch Party — ' + roomCode;
                            updateUsers(res.users);
                            addSystemMessage('Room created! Share the link with friends 🎉');
                        }
                    });
                } else {
                    roomCode = roomCodeFromUrl.toUpperCase();
                    document.getElementById('roomBadge').textContent = roomCode;
                    document.title = 'Watch Party — ' + roomCode;
                    socket.emit('join-room', { roomCode, nickname }, (res) => {
                        if (res.success) {
                            updateUsers(res.users);
                            addSystemMessage('You joined the party! 🎉');
                        } else {
                            addSystemMessage(res.error || 'Failed to join room');
                        }
                    });
                }
            });

            socket.on('disconnect', () => addSystemMessage('Disconnected...'));

            // Users
            socket.on('user-joined', ({ nickname: n, users: u }) => { updateUsers(u); addSystemMessage(n + ' joined! 🎉'); });
            socket.on('user-left', ({ nickname: n, users: u }) => { updateUsers(u); addSystemMessage(n + ' left 👋'); });

            // Chat
            socket.on('chat-message', (data) => addChatMessage(data));

            // Reactions
            socket.on('reaction', ({ emoji, nickname: n }) => showFloatingReaction(emoji, n));

            // Video sync
            socket.on('sync-play', ({ currentTime, from }) => {
                isRemoteAction = true;
                if (Math.abs(video.currentTime - currentTime) > SYNC_THRESHOLD) video.currentTime = currentTime;
                video.play().catch(() => { });
                setTimeout(() => { isRemoteAction = false; }, 500);
                showSyncIndicator(from + ' played ▶️');
            });

            socket.on('sync-pause', ({ currentTime, from }) => {
                isRemoteAction = true;
                video.pause();
                if (Math.abs(video.currentTime - currentTime) > SYNC_THRESHOLD) video.currentTime = currentTime;
                setTimeout(() => { isRemoteAction = false; }, 500);
                showSyncIndicator(from + ' paused ⏸️');
            });

            socket.on('sync-seek', ({ currentTime, from }) => {
                isRemoteAction = true;
                video.currentTime = currentTime;
                setTimeout(() => { isRemoteAction = false; }, 500);
                showSyncIndicator(from + ' seeked ⏩');
            });

            // Video URL sharing
            socket.on('share-video-url', ({ url }) => {
                video.src = url;
                document.getElementById('videoLoader').classList.add('hidden');
                addSystemMessage('Video loaded from shared URL');
            });

            // Voice
            socket.on('voice-offer', handleVoiceOffer);
            socket.on('voice-answer', handleVoiceAnswer);
            socket.on('ice-candidate', handleIceCandidate);
        }

        // ===== USERS =====
        function updateUsers(newUsers) {
            users = newUsers;
            document.getElementById('userCount').textContent = users.length;
            document.getElementById('usersBar').innerHTML = users.map(u =>
                `<div class="user-chip"><span class="user-dot"></span>${escapeHtml(u.nickname)}</div>`
            ).join('');
        }

        // ===== CHAT =====
        function sendMessage() {
            const input = document.getElementById('chatInput');
            const msg = input.value.trim();
            if (!msg || !socket) return;
            socket.emit('chat-message', { message: msg });
            input.value = '';
        }

        function addChatMessage({ nickname: n, message, timestamp }) {
            const c = document.getElementById('chatMessages');
            const empty = c.querySelector('.chat-empty'); if (empty) empty.remove();
            const ci = users.findIndex(u => u.nickname === n);
            const color = COLORS[(ci >= 0 ? ci : 0) % COLORS.length];
            const time = new Date(timestamp).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
            const d = document.createElement('div');
            d.className = 'msg';
            d.innerHTML = `<div class="msg-avatar" style="background:${color}">${n.charAt(0).toUpperCase()}</div>
        <div class="msg-body"><div class="msg-header"><span class="msg-name" style="color:${color}">${escapeHtml(n)}</span>
        <span class="msg-time">${time}</span></div><div class="msg-text">${escapeHtml(message)}</div></div>`;
            c.appendChild(d); c.scrollTop = c.scrollHeight;
        }

        function addSystemMessage(text) {
            const c = document.getElementById('chatMessages');
            const empty = c.querySelector('.chat-empty'); if (empty) empty.remove();
            const d = document.createElement('div'); d.className = 'system-msg'; d.textContent = text;
            c.appendChild(d); c.scrollTop = c.scrollHeight;
        }

        document.getElementById('chatInput').addEventListener('keydown', (e) => { if (e.key === 'Enter') sendMessage(); });

        // ===== REACTIONS =====
        function sendReaction(emoji) { if (socket) socket.emit('reaction', { emoji }); }

        function showFloatingReaction(emoji, name) {
            const c = document.getElementById('floatContainer');
            const el = document.createElement('div'); el.className = 'float-emoji';
            el.innerHTML = `<span class="float-emoji-icon">${emoji}</span><span class="float-emoji-name">${escapeHtml(name)}</span>`;
            el.style.left = `${Math.random() * 60 + 20}%`;
            c.appendChild(el); setTimeout(() => el.remove(), 4000);
        }

        // ===== SYNC INDICATOR =====
        function showSyncIndicator(text) {
            const el = document.getElementById('syncIndicator');
            el.textContent = text; el.classList.add('show');
            setTimeout(() => el.classList.remove('show'), 2500);
        }

        // ===== SHARE =====
        function copyLink() {
            const url = window.location.origin + '/room/' + roomCode;
            navigator.clipboard.writeText(url).then(() => showToast('Link copied! 🎉')).catch(() => prompt('Copy:', url));
        }

        // ===== VOICE =====
        async function toggleVoice() { isVoiceActive ? stopVoice() : await startVoice(); }

        async function startVoice() {
            try {
                localStream = await navigator.mediaDevices.getUserMedia({ audio: true });
                isVoiceActive = true; isMuted = false;
                document.getElementById('voiceIcon').textContent = '🎤';
                document.getElementById('voiceLabel').textContent = 'Voice On';
                document.getElementById('voiceToggle').classList.add('active');
                document.getElementById('muteToggle').style.display = 'flex';
                users.forEach(u => { if (u.nickname !== nickname) createPeerConnection(u.socketId, true); });
                addSystemMessage('Voice chat enabled 🎤');
            } catch (e) { addSystemMessage('Mic access denied'); }
        }

        function stopVoice() {
            if (localStream) { localStream.getTracks().forEach(t => t.stop()); localStream = null; }
            peerConnections.forEach(pc => pc.close()); peerConnections.clear();
            isVoiceActive = false;
            document.getElementById('voiceIcon').textContent = '🎤';
            document.getElementById('voiceLabel').textContent = 'Voice Off';
            document.getElementById('voiceToggle').classList.remove('active');
            document.getElementById('muteToggle').style.display = 'none';
        }

        function toggleMute() {
            if (!localStream) return; isMuted = !isMuted;
            localStream.getAudioTracks().forEach(t => { t.enabled = !isMuted; });
            document.getElementById('muteIcon').textContent = isMuted ? '🔇' : '🔊';
            if (socket) socket.emit('voice-toggle', { muted: isMuted });
        }

        function createPeerConnection(peerId, initiator) {
            const pc = new RTCPeerConnection({ iceServers: [{ urls: 'stun:stun.l.google.com:19302' }] });
            peerConnections.set(peerId, pc);
            if (localStream) localStream.getTracks().forEach(t => pc.addTrack(t, localStream));
            pc.ontrack = (e) => { const a = new Audio(); a.srcObject = e.streams[0]; a.play().catch(() => { }); };
            pc.onicecandidate = (e) => { if (e.candidate && socket) socket.emit('ice-candidate', { to: peerId, candidate: e.candidate }); };
            if (initiator) {
                pc.createOffer().then(o => pc.setLocalDescription(o)).then(() => {
                    if (socket) socket.emit('voice-offer', { to: peerId, offer: pc.localDescription });
                });
            }
            return pc;
        }

        async function handleVoiceOffer({ from, offer }) {
            if (!isVoiceActive) return;
            const pc = createPeerConnection(from, false);
            await pc.setRemoteDescription(new RTCSessionDescription(offer));
            const a = await pc.createAnswer(); await pc.setLocalDescription(a);
            if (socket) socket.emit('voice-answer', { to: from, answer: pc.localDescription });
        }
        async function handleVoiceAnswer({ from, answer }) { const pc = peerConnections.get(from); if (pc) await pc.setRemoteDescription(new RTCSessionDescription(answer)); }
        async function handleIceCandidate({ from, candidate }) { const pc = peerConnections.get(from); if (pc) await pc.addIceCandidate(new RTCIceCandidate(candidate)); }

        // ===== UTILS =====
        function showToast(msg) { const t = document.getElementById('toast'); t.textContent = msg; t.classList.add('show'); setTimeout(() => t.classList.remove('show'), 2500); }
        function escapeHtml(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

        // ===== INIT =====
        connect();
    </script>
</body>

</html>
