<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Watch Party Room</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap"
        rel="stylesheet">
    <script src="/socket.io/socket.io.js"></script>
    <style>
        :root {
            --bg: #060612;
            --bg2: #0f0f24;
            --bg3: #181838;
            --accent: #e50914;
            --accent2: #ff6b35;
            --text: #f0f0f5;
            --text2: #8888aa;
            --text3: #5c5c7a;
            --border: rgba(255, 255, 255, 0.06);
            --glow: rgba(229, 9, 20, 0.25);
            --success: #00c853;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: var(--text);
            height: 100vh;
            overflow: hidden;
        }

        .app {
            display: flex;
            height: 100vh;
            flex-direction: column;
        }

        .topbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px 20px;
            background: rgba(15, 15, 36, 0.95);
            border-bottom: 1px solid var(--border);
            z-index: 20;
            flex-shrink: 0;
        }

        .topbar-left {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .topbar-logo {
            font-size: 18px;
            font-weight: 800;
            background: linear-gradient(135deg, var(--accent), var(--accent2));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-decoration: none;
        }

        .room-badge {
            padding: 4px 10px;
            background: rgba(229, 9, 20, 0.12);
            border-radius: 6px;
            font-size: 12px;
            font-weight: 700;
            color: var(--accent);
            letter-spacing: 2px;
            cursor: pointer;
        }

        .topbar-right {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .users-pill {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 5px 12px;
            background: var(--bg3);
            border-radius: 20px;
            font-size: 12px;
            color: var(--text2);
        }

        .users-dot {
            width: 7px;
            height: 7px;
            background: var(--success);
            border-radius: 50%;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {

            0%,
            100% {
                opacity: 1
            }

            50% {
                opacity: 0.4
            }
        }

        .share-btn {
            padding: 7px 14px;
            background: linear-gradient(135deg, var(--accent), #b20710);
            border: none;
            border-radius: 8px;
            color: white;
            font-size: 12px;
            font-weight: 600;
            font-family: 'Inter';
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .main-body {
            display: flex;
            flex: 1;
            overflow: hidden;
        }

        .video-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: #000;
            position: relative;
        }

        .video-player {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }

        #mainVideo {
            width: 100%;
            height: 100%;
            object-fit: contain;
            background: #000;
        }

        /* Viewer video for receiving stream */
        #viewerVideo {
            width: 100%;
            height: 100%;
            object-fit: contain;
            background: #000;
            display: none;
            position: absolute;
            inset: 0;
        }

        #viewerVideo.active {
            display: block;
            z-index: 2;
        }

        .video-loader {
            position: absolute;
            inset: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 16px;
            background: rgba(6, 6, 18, 0.97);
            z-index: 5;
            transition: opacity 0.4s;
        }

        .video-loader.hidden {
            opacity: 0;
            pointer-events: none;
        }

        .loader-icon {
            font-size: 56px;
        }

        .loader-title {
            font-size: 22px;
            font-weight: 800;
        }

        .loader-sub {
            font-size: 13px;
            color: var(--text2);
            text-align: center;
            max-width: 420px;
            line-height: 1.6;
        }

        .loader-actions {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            justify-content: center;
            margin-top: 4px;
        }

        .loader-btn {
            padding: 14px 24px;
            border-radius: 12px;
            font-size: 14px;
            font-weight: 600;
            font-family: 'Inter';
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: all 0.2s;
            border: none;
        }

        .loader-btn:hover {
            transform: translateY(-2px);
        }

        .loader-btn-screen {
            background: linear-gradient(135deg, #2979ff, #1565c0);
            color: white;
            box-shadow: 0 4px 20px rgba(41, 121, 255, 0.3);
        }

        .loader-btn-primary {
            background: linear-gradient(135deg, var(--accent), #b20710);
            color: white;
            box-shadow: 0 4px 15px var(--glow);
        }

        .loader-btn-secondary {
            background: var(--bg3);
            color: var(--text);
            border: 1px solid var(--border);
        }

        .url-input-wrap {
            display: none;
            width: 100%;
            max-width: 500px;
            flex-direction: column;
            gap: 8px;
            margin-top: 8px;
        }

        .url-input-wrap.show {
            display: flex;
        }

        .url-input {
            width: 100%;
            padding: 12px 16px;
            background: var(--bg3);
            border: 1px solid var(--border);
            border-radius: 10px;
            color: var(--text);
            font-size: 14px;
            font-family: 'Inter';
            outline: none;
        }

        .url-load-btn {
            padding: 10px;
            background: var(--accent);
            border: none;
            border-radius: 8px;
            color: white;
            font-weight: 600;
            cursor: pointer;
            font-family: 'Inter';
        }

        .drop-overlay {
            position: absolute;
            inset: 0;
            background: rgba(229, 9, 20, 0.1);
            border: 3px dashed var(--accent);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 10;
        }

        .drop-overlay.active {
            display: flex;
        }

        #fileInput {
            display: none;
        }

        .sync-indicator {
            position: absolute;
            top: 12px;
            left: 12px;
            padding: 6px 14px;
            background: rgba(0, 0, 0, 0.7);
            border-radius: 8px;
            font-size: 12px;
            color: #ff6b6b;
            font-weight: 500;
            opacity: 0;
            transition: opacity 0.3s;
            z-index: 6;
        }

        .sync-indicator.show {
            opacity: 1;
        }

        .stop-sharing-bar {
            position: absolute;
            bottom: 16px;
            left: 50%;
            transform: translateX(-50%);
            padding: 10px 24px;
            background: rgba(229, 9, 20, 0.9);
            border-radius: 12px;
            display: none;
            align-items: center;
            gap: 10px;
            z-index: 8;
            cursor: pointer;
            font-size: 13px;
            font-weight: 600;
            color: white;
            border: none;
            font-family: 'Inter';
            box-shadow: 0 4px 20px rgba(229, 9, 20, 0.4);
        }

        .stop-sharing-bar.show {
            display: flex;
        }

        .live-badge {
            position: absolute;
            top: 12px;
            right: 12px;
            padding: 5px 12px;
            background: rgba(244, 67, 54, 0.2);
            border: 1px solid rgba(244, 67, 54, 0.5);
            border-radius: 16px;
            font-size: 11px;
            color: #ef5350;
            font-weight: 700;
            z-index: 8;
            display: none;
            align-items: center;
            gap: 6px;
            letter-spacing: 1px;
        }

        .live-badge.show {
            display: flex;
        }

        .live-dot {
            width: 8px;
            height: 8px;
            background: #f44336;
            border-radius: 50%;
            animation: live-pulse 1.2s infinite;
        }

        @keyframes live-pulse {

            0%,
            100% {
                transform: scale(1)
            }

            50% {
                transform: scale(1.4);
                opacity: 0.7
            }
        }

        .sidebar {
            width: 360px;
            background: var(--bg2);
            border-left: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            flex-shrink: 0;
        }

        .sidebar-header {
            padding: 12px 16px;
            border-bottom: 1px solid var(--border);
            font-size: 14px;
            font-weight: 700;
        }

        .sidebar-users {
            display: flex;
            gap: 4px;
            padding: 8px 12px;
            border-bottom: 1px solid var(--border);
            flex-wrap: wrap;
        }

        .user-chip {
            display: flex;
            align-items: center;
            gap: 5px;
            padding: 4px 10px;
            background: var(--bg3);
            border-radius: 16px;
            font-size: 11px;
            font-weight: 500;
        }

        .u-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: var(--success);
        }

        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 10px 14px;
            display: flex;
            flex-direction: column;
            gap: 6px;
            scroll-behavior: smooth;
        }

        .chat-empty {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: var(--text3);
            gap: 6px;
        }

        .msg {
            display: flex;
            gap: 8px;
            animation: msg-in 0.2s ease;
        }

        @keyframes msg-in {
            from {
                opacity: 0;
                transform: translateY(5px)
            }

            to {
                opacity: 1;
                transform: translateY(0)
            }
        }

        .msg-avatar {
            width: 28px;
            height: 28px;
            min-width: 28px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 11px;
            font-weight: 700;
            color: white;
        }

        .msg-body {
            flex: 1;
            min-width: 0;
        }

        .msg-header {
            display: flex;
            gap: 6px;
            align-items: baseline;
            margin-bottom: 1px;
        }

        .msg-name {
            font-size: 11px;
            font-weight: 600;
        }

        .msg-time {
            font-size: 9px;
            color: var(--text3);
        }

        .msg-text {
            font-size: 12px;
            color: #c8c8e0;
            word-wrap: break-word;
            line-height: 1.5;
        }

        .system-msg {
            text-align: center;
            font-size: 11px;
            color: var(--text3);
            padding: 3px 0;
        }

        .reactions-bar {
            display: flex;
            gap: 2px;
            padding: 6px 10px;
            justify-content: center;
            border-top: 1px solid var(--border);
        }

        .react-btn {
            width: 32px;
            height: 32px;
            border: none;
            background: transparent;
            font-size: 17px;
            cursor: pointer;
            border-radius: 6px;
            transition: all 0.15s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .react-btn:hover {
            background: rgba(255, 255, 255, 0.08);
            transform: scale(1.2);
        }

        .chat-input-area {
            display: flex;
            gap: 6px;
            padding: 10px 12px;
            border-top: 1px solid var(--border);
        }

        .chat-input {
            flex: 1;
            padding: 10px 14px;
            background: var(--bg3);
            border: 1px solid var(--border);
            border-radius: 10px;
            color: var(--text);
            font-size: 12px;
            font-family: 'Inter';
            outline: none;
        }

        .chat-input::placeholder {
            color: var(--text3);
        }

        .send-btn {
            width: 40px;
            height: 40px;
            border-radius: 10px;
            background: linear-gradient(135deg, var(--accent), #b20710);
            border: none;
            color: white;
            font-size: 16px;
            cursor: pointer;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .voice-bar {
            display: flex;
            gap: 6px;
            padding: 8px 10px;
            border-top: 1px solid var(--border);
            background: rgba(15, 15, 36, 0.5);
        }

        .voice-btn {
            flex: 1;
            padding: 8px;
            border-radius: 8px;
            background: var(--bg3);
            border: 1px solid var(--border);
            color: var(--text2);
            font-size: 12px;
            font-family: 'Inter';
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 5px;
        }

        .voice-btn.active {
            background: rgba(0, 200, 83, 0.1);
            border-color: rgba(0, 200, 83, 0.3);
            color: var(--success);
        }

        .mute-btn {
            flex: 0;
            width: 40px;
            display: none;
        }

        .float-container {
            position: fixed;
            left: 0;
            right: 360px;
            top: 0;
            bottom: 0;
            pointer-events: none;
            z-index: 100;
            overflow: hidden;
        }

        .float-emoji {
            position: absolute;
            bottom: -60px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 3px;
            animation: float-up 3s ease-out forwards;
        }

        .float-emoji-icon {
            font-size: 40px;
        }

        .float-emoji-name {
            font-size: 9px;
            color: white;
            background: rgba(0, 0, 0, 0.6);
            padding: 2px 6px;
            border-radius: 3px;
            font-weight: 600;
        }

        @keyframes float-up {
            0% {
                bottom: 10%;
                opacity: 1;
                transform: scale(0.5)
            }

            20% {
                transform: scale(1.3);
                opacity: 1
            }

            100% {
                bottom: 85%;
                opacity: 0;
                transform: scale(0.7)
            }
        }

        .toast {
            position: fixed;
            top: 60px;
            left: 50%;
            transform: translateX(-50%) translateY(-20px);
            padding: 8px 18px;
            background: rgba(0, 200, 83, 0.15);
            border: 1px solid rgba(0, 200, 83, 0.3);
            border-radius: 8px;
            color: var(--success);
            font-size: 12px;
            opacity: 0;
            transition: all 0.3s;
            z-index: 2000;
        }

        .toast.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }

        .chat-messages::-webkit-scrollbar {
            width: 3px;
        }

        .chat-messages::-webkit-scrollbar-thumb {
            background: rgba(136, 136, 170, 0.3);
        }

        @media (max-width:768px) {
            .main-body {
                flex-direction: column;
            }

            .video-area {
                height: 40vh;
                flex: none;
            }

            .sidebar {
                width: 100%;
                flex: 1;
                border-left: none;
                border-top: 1px solid var(--border);
            }

            .float-container {
                right: 0;
            }
        }
    </style>
</head>

<body>
    <div class="app">
        <div class="topbar">
            <div class="topbar-left">
                <a href="/" class="topbar-logo">🎬 Watch Party</a>
                <span class="room-badge" id="roomBadge" onclick="copyLink()">------</span>
            </div>
            <div class="topbar-right">
                <div class="users-pill"><span class="users-dot"></span><span id="userCount">0</span> watching</div>
                <button class="share-btn" onclick="copyLink()">📤 Share Link</button>
            </div>
        </div>
        <div class="main-body">
            <div class="video-area" id="videoArea">
                <div class="video-player">
                    <video id="mainVideo" controls></video>
                    <video id="viewerVideo" autoplay playsinline></video>
                    <div class="video-loader" id="videoLoader">
                        <div class="loader-icon">🎬</div>
                        <div class="loader-title">Load a Video</div>
                        <div class="loader-sub">Share your screen, choose a file, or paste a URL</div>
                        <div class="loader-actions">
                            <button class="loader-btn loader-btn-screen" onclick="startScreenShare()">🖥️ Share
                                Screen</button>
                            <button class="loader-btn loader-btn-primary"
                                onclick="document.getElementById('fileInput').click()">📁 Choose File</button>
                            <button class="loader-btn loader-btn-secondary" onclick="toggleUrlInput()">🔗 Paste
                                URL</button>
                        </div>
                        <div class="loader-sub" style="font-size:11px;margin-top:2px;color:var(--text3)">Share Screen =
                            share your JioHotstar tab so friends watch with you!</div>
                        <div class="url-input-wrap" id="urlInputWrap">
                            <input type="text" class="url-input" id="urlInput"
                                placeholder="Paste video URL (.mp4, .webm, etc.)">
                            <button class="url-load-btn" onclick="loadUrl()">Load Video</button>
                        </div>
                    </div>
                    <div class="drop-overlay" id="dropOverlay"><span>📁 Drop video here</span></div>
                    <div class="sync-indicator" id="syncIndicator"></div>
                    <button class="stop-sharing-bar" id="stopSharingBar" onclick="stopScreenShare()">🛑 Stop
                        Sharing</button>
                    <div class="live-badge" id="liveBadge"><span class="live-dot"></span><span
                            id="liveLabel">LIVE</span></div>
                </div>
                <input type="file" id="fileInput" accept="video/*" onchange="loadFile(event)">
            </div>
            <div class="sidebar">
                <div class="sidebar-header">💬 Chat</div>
                <div class="sidebar-users" id="usersBar"></div>
                <div class="chat-messages" id="chatMessages">
                    <div class="chat-empty"><span>💬</span>
                        <p>Say hi!</p>
                    </div>
                </div>
                <div class="reactions-bar">
                    <button class="react-btn" onclick="sendReaction('🔥')">🔥</button>
                    <button class="react-btn" onclick="sendReaction('😂')">😂</button>
                    <button class="react-btn" onclick="sendReaction('😱')">😱</button>
                    <button class="react-btn" onclick="sendReaction('❤️')">❤️</button>
                    <button class="react-btn" onclick="sendReaction('👏')">👏</button>
                    <button class="react-btn" onclick="sendReaction('🥵')">🥵</button>
                    <button class="react-btn" onclick="sendReaction('😍')">😍</button>
                    <button class="react-btn" onclick="sendReaction('💀')">💀</button>
                    <button class="react-btn" onclick="sendReaction('🤯')">🤯</button>
                    <button class="react-btn" onclick="sendReaction('😭')">😭</button>
                </div>
                <div class="chat-input-area">
                    <input type="text" class="chat-input" id="chatInput" placeholder="Type a message..." maxlength="500"
                        autocomplete="off">
                    <button class="send-btn" onclick="sendMessage()">➤</button>
                </div>
                <div class="voice-bar">
                    <button class="voice-btn" id="voiceToggle" onclick="toggleVoice()"><span
                            id="voiceIcon">🎤</span><span id="voiceLabel">Voice Off</span></button>
                    <button class="voice-btn mute-btn" id="muteToggle" onclick="toggleMute()"><span
                            id="muteIcon">🔊</span></button>
                </div>
            </div>
        </div>
    </div>
    <div class="float-container" id="floatContainer"></div>
    <div class="toast" id="toast"></div>

    <script>
        const COLORS = ['#e50914', '#ff6b35', '#00c853', '#2979ff', '#aa00ff', '#ff4081', '#00e5ff', '#ffab00'];
        const urlParts = window.location.pathname.split('/');
        const roomCodeFromUrl = urlParts[urlParts.length - 1];
        const params = new URLSearchParams(window.location.search);
        const nickname = params.get('name') || localStorage.getItem('wp-nickname') || 'Guest';
        const isNewRoom = roomCodeFromUrl === 'NEW';

        let socket = null, users = [], roomCode = '';
        let isRemoteAction = false, lastSyncTime = 0;
        let isVoiceActive = false, isMuted = false, localStream = null, peerConnections = new Map();
        let screenStream = null, isScreenSharing = false, mediaRecorder = null;

        const video = document.getElementById('mainVideo');
        const viewerVideo = document.getElementById('viewerVideo');
        const ICE = { iceServers: [{ urls: 'stun:stun.l.google.com:19302' }] };

        // MediaSource for viewer
        let mediaSource = null, sourceBuffer = null, chunkQueue = [], isViewingStream = false;

        // ===== VIDEO LOADING =====
        function loadFile(e) {
            const f = e.target.files[0]; if (!f) return;
            video.src = URL.createObjectURL(f);
            document.getElementById('videoLoader').classList.add('hidden');
            addSystemMessage('Video loaded: ' + f.name);
        }
        function toggleUrlInput() { document.getElementById('urlInputWrap').classList.toggle('show'); }
        function loadUrl() {
            const url = document.getElementById('urlInput').value.trim(); if (!url) return;
            video.src = url; document.getElementById('videoLoader').classList.add('hidden');
            addSystemMessage('Video loaded from URL');
            if (socket) socket.emit('share-video-url', { url });
        }

        const videoArea = document.getElementById('videoArea');
        videoArea.addEventListener('dragover', e => { e.preventDefault(); document.getElementById('dropOverlay').classList.add('active'); });
        videoArea.addEventListener('dragleave', () => document.getElementById('dropOverlay').classList.remove('active'));
        videoArea.addEventListener('drop', e => {
            e.preventDefault(); document.getElementById('dropOverlay').classList.remove('active');
            const f = e.dataTransfer.files[0];
            if (f && f.type.startsWith('video/')) { video.src = URL.createObjectURL(f); document.getElementById('videoLoader').classList.add('hidden'); addSystemMessage('Video loaded: ' + f.name); }
        });

        // ===== VIDEO SYNC =====
        video.addEventListener('play', () => { if (!isRemoteAction && socket) socket.emit('sync-play', { currentTime: video.currentTime }); });
        video.addEventListener('pause', () => { if (!isRemoteAction && socket) socket.emit('sync-pause', { currentTime: video.currentTime }); });
        video.addEventListener('seeked', () => { if (isRemoteAction) return; const now = Date.now(); if (now - lastSyncTime < 500) return; lastSyncTime = now; if (socket) socket.emit('sync-seek', { currentTime: video.currentTime }); });

        // ===== SCREEN SHARING (HOST) - uses MediaRecorder to stream via server =====
        async function startScreenShare() {
            try {
                screenStream = await navigator.mediaDevices.getDisplayMedia({
                    video: { cursor: 'always', width: { ideal: 1280 }, height: { ideal: 720 }, frameRate: { ideal: 24 } },
                    audio: true
                });
                isScreenSharing = true;

                // Show locally
                video.srcObject = screenStream; video.muted = true; video.play().catch(() => { });
                document.getElementById('videoLoader').classList.add('hidden');
                document.getElementById('stopSharingBar').classList.add('show');
                document.getElementById('liveBadge').classList.add('show');
                document.getElementById('liveLabel').textContent = 'SHARING';
                socket.emit('screen-share-start');
                addSystemMessage('You started sharing your screen 🖥️');

                // Use MediaRecorder to encode and send video chunks
                const mimeType = MediaRecorder.isTypeSupported('video/webm;codecs=vp8,opus')
                    ? 'video/webm;codecs=vp8,opus'
                    : MediaRecorder.isTypeSupported('video/webm;codecs=vp8')
                        ? 'video/webm;codecs=vp8'
                        : 'video/webm';

                mediaRecorder = new MediaRecorder(screenStream, {
                    mimeType: mimeType,
                    videoBitsPerSecond: 800000 // 800kbps - good balance of quality and speed
                });

                mediaRecorder.ondataavailable = (e) => {
                    if (e.data && e.data.size > 0 && socket) {
                        e.data.arrayBuffer().then(buf => {
                            socket.emit('stream-data', buf);
                        });
                    }
                };

                // Send chunks every 500ms for low latency
                mediaRecorder.start(500);

                // Handle browser stop button
                screenStream.getVideoTracks()[0].addEventListener('ended', stopScreenShare);
            } catch (err) {
                addSystemMessage('Screen share cancelled');
            }
        }

        function stopScreenShare() {
            if (mediaRecorder && mediaRecorder.state !== 'inactive') { mediaRecorder.stop(); mediaRecorder = null; }
            if (screenStream) { screenStream.getTracks().forEach(t => t.stop()); screenStream = null; }
            isScreenSharing = false;
            video.srcObject = null; video.muted = false;
            document.getElementById('videoLoader').classList.remove('hidden');
            document.getElementById('stopSharingBar').classList.remove('show');
            document.getElementById('liveBadge').classList.remove('show');
            if (socket) socket.emit('screen-share-stop');
            addSystemMessage('Screen sharing stopped');
        }

        // ===== VIEWER: receive stream via MediaSource =====
        function initViewerStream(sharerName) {
            isViewingStream = true;
            document.getElementById('videoLoader').classList.add('hidden');
            viewerVideo.classList.add('active');
            document.getElementById('liveBadge').classList.add('show');
            document.getElementById('liveLabel').textContent = sharerName + ' • LIVE';

            // Use MediaSource to play the webm chunks
            if (MediaSource.isTypeSupported('video/webm;codecs=vp8,opus') || MediaSource.isTypeSupported('video/webm;codecs=vp8')) {
                mediaSource = new MediaSource();
                viewerVideo.src = URL.createObjectURL(mediaSource);

                mediaSource.addEventListener('sourceopen', () => {
                    const codec = MediaSource.isTypeSupported('video/webm;codecs=vp8,opus')
                        ? 'video/webm;codecs=vp8,opus'
                        : 'video/webm;codecs=vp8';
                    try {
                        sourceBuffer = mediaSource.addSourceBuffer(codec);
                        sourceBuffer.mode = 'sequence';

                        sourceBuffer.addEventListener('updateend', () => {
                            // Process queued chunks
                            if (chunkQueue.length > 0 && !sourceBuffer.updating) {
                                const next = chunkQueue.shift();
                                try { sourceBuffer.appendBuffer(next); } catch (e) { /* buffer full, skip */ }
                            }
                            // Keep buffer manageable - remove old data
                            try {
                                if (viewerVideo.currentTime > 10 && sourceBuffer.buffered.length > 0) {
                                    sourceBuffer.remove(0, viewerVideo.currentTime - 5);
                                }
                            } catch (e) { }
                        });

                        sourceBuffer.addEventListener('error', (e) => {
                            console.error('SourceBuffer error:', e);
                        });
                    } catch (e) {
                        console.error('Failed to create source buffer:', e);
                        // Fallback to blob URL approach
                        useBlobFallback = true;
                    }
                });
            } else {
                useBlobFallback = true;
            }
        }

        let useBlobFallback = false;
        let blobParts = [];

        function appendStreamChunk(data) {
            if (useBlobFallback) {
                // Fallback: accumulate and re-create blob URL periodically
                blobParts.push(new Uint8Array(data));
                return;
            }

            if (!sourceBuffer) {
                chunkQueue.push(new Uint8Array(data));
                return;
            }

            if (sourceBuffer.updating) {
                // Queue it, but limit queue to avoid memory buildup
                if (chunkQueue.length < 30) {
                    chunkQueue.push(new Uint8Array(data));
                }
            } else {
                try {
                    sourceBuffer.appendBuffer(new Uint8Array(data));
                } catch (e) {
                    console.warn('Append failed:', e.message);
                    // Try to recover by clearing buffer
                    try {
                        if (sourceBuffer.buffered.length > 0) {
                            sourceBuffer.remove(0, sourceBuffer.buffered.end(sourceBuffer.buffered.length - 1));
                        }
                    } catch (e2) { }
                }
            }

            // Auto-play if paused
            if (viewerVideo.paused) viewerVideo.play().catch(() => { });
        }

        function stopViewerStream() {
            isViewingStream = false;
            viewerVideo.classList.remove('active');
            chunkQueue = [];
            blobParts = [];
            if (mediaSource && mediaSource.readyState === 'open') {
                try { mediaSource.endOfStream(); } catch (e) { }
            }
            mediaSource = null; sourceBuffer = null;
            document.getElementById('videoLoader').classList.remove('hidden');
            document.getElementById('liveBadge').classList.remove('show');
        }

        // ===== SOCKET =====
        function connect() {
            socket = io();

            socket.on('connect', () => {
                if (isNewRoom) {
                    socket.emit('create-room', { nickname }, res => {
                        if (res.success) { roomCode = res.roomCode; window.history.replaceState({}, '', '/room/' + roomCode); document.getElementById('roomBadge').textContent = roomCode; document.title = 'Watch Party — ' + roomCode; updateUsers(res.users); addSystemMessage('Room created! Share the link 🎉'); }
                    });
                } else {
                    roomCode = roomCodeFromUrl.toUpperCase();
                    document.getElementById('roomBadge').textContent = roomCode;
                    document.title = 'Watch Party — ' + roomCode;
                    socket.emit('join-room', { roomCode, nickname }, res => {
                        if (res.success) {
                            updateUsers(res.users);
                            addSystemMessage('You joined the party! 🎉');
                            if (res.screenSharer) {
                                addSystemMessage(res.screenSharerName + ' is sharing their screen 🖥️');
                                initViewerStream(res.screenSharerName);
                            }
                        } else addSystemMessage(res.error || 'Failed to join');
                    });
                }
            });

            socket.on('disconnect', () => addSystemMessage('Disconnected...'));
            socket.on('user-joined', ({ nickname: n, users: u }) => { updateUsers(u); addSystemMessage(n + ' joined! 🎉'); });
            socket.on('user-left', ({ nickname: n, users: u }) => { updateUsers(u); addSystemMessage(n + ' left 👋'); });
            socket.on('chat-message', data => addChatMessage(data));
            socket.on('reaction', ({ emoji, nickname: n }) => showFloatingReaction(emoji, n));

            // Video sync
            socket.on('sync-play', ({ currentTime, from }) => { isRemoteAction = true; if (Math.abs(video.currentTime - currentTime) > 2) video.currentTime = currentTime; video.play().catch(() => { }); setTimeout(() => isRemoteAction = false, 500); showSyncIndicator(from + ' ▶️'); });
            socket.on('sync-pause', ({ currentTime, from }) => { isRemoteAction = true; video.pause(); if (Math.abs(video.currentTime - currentTime) > 2) video.currentTime = currentTime; setTimeout(() => isRemoteAction = false, 500); showSyncIndicator(from + ' ⏸️'); });
            socket.on('sync-seek', ({ currentTime, from }) => { isRemoteAction = true; video.currentTime = currentTime; setTimeout(() => isRemoteAction = false, 500); showSyncIndicator(from + ' ⏩'); });
            socket.on('share-video-url', ({ url }) => { video.src = url; document.getElementById('videoLoader').classList.add('hidden'); addSystemMessage('Video loaded from shared URL'); });

            // Screen share viewer events
            socket.on('screen-share-start', ({ nickname: n }) => {
                addSystemMessage(n + ' is sharing their screen 🖥️');
                initViewerStream(n);
            });

            socket.on('screen-share-stop', ({ nickname: n }) => {
                addSystemMessage((n || 'Host') + ' stopped sharing');
                stopViewerStream();
            });

            // Receive encoded video chunks from server relay
            socket.on('stream-data', (data) => {
                if (!isScreenSharing) { // Only viewers process stream data
                    appendStreamChunk(data);
                }
            });

            // Voice
            socket.on('voice-offer', handleVoiceOffer);
            socket.on('voice-answer', handleVoiceAnswer);
            socket.on('ice-candidate', handleIceCandidate);
        }

        // ===== USERS =====
        function updateUsers(u) {
            users = u; document.getElementById('userCount').textContent = users.length;
            document.getElementById('usersBar').innerHTML = users.map(x => `<div class="user-chip"><span class="u-dot"></span>${escapeHtml(x.nickname)}</div>`).join('');
        }

        // ===== CHAT =====
        function sendMessage() { const i = document.getElementById('chatInput'); const m = i.value.trim(); if (!m || !socket) return; socket.emit('chat-message', { message: m }); i.value = ''; }
        function addChatMessage({ nickname: n, message, timestamp }) {
            const c = document.getElementById('chatMessages'); const e = c.querySelector('.chat-empty'); if (e) e.remove();
            const ci = users.findIndex(u => u.nickname === n); const color = COLORS[(ci >= 0 ? ci : 0) % COLORS.length];
            const t = new Date(timestamp).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
            const d = document.createElement('div'); d.className = 'msg';
            d.innerHTML = `<div class="msg-avatar" style="background:${color}">${n.charAt(0).toUpperCase()}</div><div class="msg-body"><div class="msg-header"><span class="msg-name" style="color:${color}">${escapeHtml(n)}</span><span class="msg-time">${t}</span></div><div class="msg-text">${escapeHtml(message)}</div></div>`;
            c.appendChild(d); c.scrollTop = c.scrollHeight;
        }
        function addSystemMessage(t) { const c = document.getElementById('chatMessages'); const e = c.querySelector('.chat-empty'); if (e) e.remove(); const d = document.createElement('div'); d.className = 'system-msg'; d.textContent = t; c.appendChild(d); c.scrollTop = c.scrollHeight; }
        document.getElementById('chatInput').addEventListener('keydown', e => { if (e.key === 'Enter') sendMessage(); });

        function sendReaction(emoji) { if (socket) socket.emit('reaction', { emoji }); }
        function showFloatingReaction(emoji, name) { const c = document.getElementById('floatContainer'); const el = document.createElement('div'); el.className = 'float-emoji'; el.innerHTML = `<span class="float-emoji-icon">${emoji}</span><span class="float-emoji-name">${escapeHtml(name)}</span>`; el.style.left = `${Math.random() * 60 + 20}%`; c.appendChild(el); setTimeout(() => el.remove(), 4000); }
        function showSyncIndicator(t) { const el = document.getElementById('syncIndicator'); el.textContent = t; el.classList.add('show'); setTimeout(() => el.classList.remove('show'), 2500); }
        function copyLink() { const url = window.location.origin + '/room/' + roomCode; navigator.clipboard.writeText(url).then(() => showToast('Link copied! 🎉')).catch(() => prompt('Copy:', url)); }

        // ===== VOICE =====
        async function toggleVoice() { isVoiceActive ? stopVoice() : await startVoice(); }
        async function startVoice() {
            try {
                localStream = await navigator.mediaDevices.getUserMedia({ audio: true }); isVoiceActive = true; isMuted = false;
                document.getElementById('voiceIcon').textContent = '🎤'; document.getElementById('voiceLabel').textContent = 'Voice On';
                document.getElementById('voiceToggle').classList.add('active'); document.getElementById('muteToggle').style.display = 'flex';
                users.forEach(u => { if (u.nickname !== nickname) createVoicePC(u.socketId, true); }); addSystemMessage('Voice chat enabled 🎤');
            } catch (e) { addSystemMessage('Mic denied'); }
        }
        function stopVoice() { if (localStream) { localStream.getTracks().forEach(t => t.stop()); localStream = null; } peerConnections.forEach(pc => pc.close()); peerConnections.clear(); isVoiceActive = false; document.getElementById('voiceIcon').textContent = '🎤'; document.getElementById('voiceLabel').textContent = 'Voice Off'; document.getElementById('voiceToggle').classList.remove('active'); document.getElementById('muteToggle').style.display = 'none'; }
        function toggleMute() { if (!localStream) return; isMuted = !isMuted; localStream.getAudioTracks().forEach(t => { t.enabled = !isMuted; }); document.getElementById('muteIcon').textContent = isMuted ? '🔇' : '🔊'; }
        function createVoicePC(peerId, initiator) {
            const pc = new RTCPeerConnection(ICE); peerConnections.set(peerId, pc);
            if (localStream) localStream.getTracks().forEach(t => pc.addTrack(t, localStream));
            pc.ontrack = e => { const a = new Audio(); a.srcObject = e.streams[0]; a.play().catch(() => { }); };
            pc.onicecandidate = e => { if (e.candidate && socket) socket.emit('ice-candidate', { to: peerId, candidate: e.candidate }); };
            if (initiator) { pc.createOffer().then(o => pc.setLocalDescription(o)).then(() => socket.emit('voice-offer', { to: peerId, offer: pc.localDescription })); }
            return pc;
        }
        async function handleVoiceOffer({ from, offer }) { if (!isVoiceActive) return; const pc = createVoicePC(from, false); await pc.setRemoteDescription(new RTCSessionDescription(offer)); const a = await pc.createAnswer(); await pc.setLocalDescription(a); socket.emit('voice-answer', { to: from, answer: pc.localDescription }); }
        async function handleVoiceAnswer({ from, answer }) { const pc = peerConnections.get(from); if (pc) await pc.setRemoteDescription(new RTCSessionDescription(answer)); }
        async function handleIceCandidate({ from, candidate }) { const pc = peerConnections.get(from); if (pc) await pc.addIceCandidate(new RTCIceCandidate(candidate)); }

        function showToast(msg) { const t = document.getElementById('toast'); t.textContent = msg; t.classList.add('show'); setTimeout(() => t.classList.remove('show'), 2500); }
        function escapeHtml(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

        connect();
    </script>
</body>
