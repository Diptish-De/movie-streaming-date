<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Watch Party — Watch Together with Friends</title>
    <meta name="description"
        content="Watch JioHotstar together with friends. Synced playback, live chat, emoji reactions & voice chat.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --bg: #060612;
            --bg2: #0f0f24;
            --bg3: #181838;
            --accent: #e50914;
            --accent2: #ff6b35;
            --text: #f0f0f5;
            --text2: #8888aa;
            --text3: #5c5c7a;
            --border: rgba(255, 255, 255, 0.06);
            --glow: rgba(229, 9, 20, 0.25);
            --radius: 16px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Animated BG */
        .bg-glow {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 0;
        }

        .bg-glow::before {
            content: '';
            position: absolute;
            top: -20%;
            left: 30%;
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(229, 9, 20, 0.08) 0%, transparent 70%);
            animation: float1 8s ease-in-out infinite;
        }

        .bg-glow::after {
            content: '';
            position: absolute;
            bottom: -10%;
            right: 20%;
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, rgba(255, 107, 53, 0.06) 0%, transparent 70%);
            animation: float2 10s ease-in-out infinite;
        }

        @keyframes float1 {

            0%,
            100% {
                transform: translate(0, 0);
            }

            50% {
                transform: translate(-40px, 30px);
            }
        }

        @keyframes float2 {

            0%,
            100% {
                transform: translate(0, 0);
            }

            50% {
                transform: translate(30px, -40px);
            }
        }

        .container {
            max-width: 500px;
            margin: 0 auto;
            padding: 40px 20px;
            position: relative;
            z-index: 1;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        /* Header */
        .header {
            text-align: center;
            margin-bottom: 48px;
        }

        .header-icon {
            font-size: 56px;
            margin-bottom: 16px;
            display: block;
            animation: pulse-glow 3s ease-in-out infinite;
        }

        @keyframes pulse-glow {

            0%,
            100% {
                filter: brightness(1) drop-shadow(0 0 10px rgba(229, 9, 20, 0.3));
            }

            50% {
                filter: brightness(1.2) drop-shadow(0 0 25px rgba(229, 9, 20, 0.5));
            }
        }

        .header h1 {
            font-size: 36px;
            font-weight: 900;
            background: linear-gradient(135deg, var(--accent), var(--accent2));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: -1px;
            margin-bottom: 8px;
        }

        .header p {
            color: var(--text2);
            font-size: 15px;
            letter-spacing: 0.5px;
        }

        /* Card */
        .card {
            background: rgba(15, 15, 36, 0.8);
            backdrop-filter: blur(20px);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 32px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.4);
        }

        .input-group {
            margin-bottom: 16px;
        }

        .input-group label {
            display: block;
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text2);
            margin-bottom: 8px;
        }

        .input-group input {
            width: 100%;
            padding: 14px 16px;
            background: var(--bg3);
            border: 1px solid var(--border);
            border-radius: 12px;
            color: var(--text);
            font-size: 15px;
            font-family: 'Inter', sans-serif;
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        .input-group input::placeholder {
            color: var(--text3);
        }

        .input-group input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px var(--glow);
        }

        .btn {
            width: 100%;
            padding: 16px;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 700;
            font-family: 'Inter', sans-serif;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            position: relative;
            overflow: hidden;
        }

        .btn::after {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(rgba(255, 255, 255, 0.08), transparent);
            opacity: 0;
            transition: opacity 0.2s;
        }

        .btn:hover::after {
            opacity: 1;
        }

        .btn:active {
            transform: scale(0.98);
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--accent), #b20710);
            color: white;
            box-shadow: 0 4px 20px var(--glow);
        }

        .btn-primary:hover {
            box-shadow: 0 6px 30px rgba(229, 9, 20, 0.4);
        }

        .btn-secondary {
            background: var(--bg3);
            color: var(--text);
            border: 1px solid var(--border);
        }

        .btn-secondary:hover {
            border-color: rgba(255, 255, 255, 0.15);
        }

        .divider {
            display: flex;
            align-items: center;
            gap: 16px;
            margin: 24px 0;
        }

        .divider::before,
        .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: var(--border);
        }

        .divider span {
            font-size: 12px;
            color: var(--text3);
            text-transform: uppercase;
            letter-spacing: 1.5px;
            font-weight: 600;
        }

        .error-msg {
            color: #ff4757;
            font-size: 13px;
            text-align: center;
            margin-top: 12px;
            min-height: 20px;
        }

        /* Features */
        .features {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-top: 32px;
        }

        .feature {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 14px;
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid var(--border);
            border-radius: 12px;
            transition: all 0.2s;
        }

        .feature:hover {
            background: rgba(255, 255, 255, 0.04);
            border-color: rgba(255, 255, 255, 0.1);
            transform: translateY(-2px);
        }

        .feature-icon {
            font-size: 22px;
        }

        .feature-text {
            font-size: 12px;
            font-weight: 600;
            color: var(--text2);
        }

        .room-code-input {
            text-transform: uppercase;
            letter-spacing: 4px;
            text-align: center;
            font-weight: 800 !important;
            font-size: 20px !important;
        }

        /* Footer */
        .footer {
            text-align: center;
            margin-top: 32px;
            font-size: 12px;
            color: var(--text3);
        }
    </style>
</head>

<body>
    <div class="bg-glow"></div>

    <div class="container">
        <div class="header">
            <span class="header-icon">🎬</span>
            <h1>Watch Party</h1>
            <p>Watch JioHotstar together with friends</p>
        </div>

        <div class="card">
            <div class="input-group">
                <label>Your Nickname</label>
                <input type="text" id="nickname" placeholder="What should we call you?" maxlength="20"
                    autocomplete="off">
            </div>

            <button class="btn btn-primary" id="createBtn" onclick="createRoom()">
                🏠 Create Watch Party
            </button>

            <div class="divider"><span>or join a friend</span></div>

            <div class="input-group">
                <label>Room Code</label>
                <input type="text" id="roomCode" class="room-code-input" placeholder="ABC123" maxlength="6"
                    autocomplete="off">
            </div>

            <button class="btn btn-secondary" id="joinBtn" onclick="joinRoom()">
                🚀 Join Room
            </button>

            <p class="error-msg" id="errorMsg"></p>
        </div>

        <div class="features">
            <div class="feature">
                <span class="feature-icon">🔄</span>
                <span class="feature-text">Synced Playback</span>
            </div>
            <div class="feature">
                <span class="feature-icon">💬</span>
                <span class="feature-text">Live Chat</span>
            </div>
            <div class="feature">
                <span class="feature-icon">🔥</span>
                <span class="feature-text">Emoji Reactions</span>
            </div>
            <div class="feature">
                <span class="feature-icon">🎤</span>
                <span class="feature-text">Voice Chat</span>
            </div>
        </div>

        <div class="footer">
            Made for movie nights 🍿
        </div>
    </div>

    <script>
        function createRoom() {
            const nickname = document.getElementById('nickname').value.trim();
            if (!nickname) {
                showError('Enter a nickname first!');
                return;
            }
            localStorage.setItem('wp-nickname', nickname);
            // We'll create the room on the room page
            window.location.href = '/room/NEW?name=' + encodeURIComponent(nickname);
        }

        function joinRoom() {
            const nickname = document.getElementById('nickname').value.trim();
            const code = document.getElementById('roomCode').value.trim().toUpperCase();
            if (!nickname) { showError('Enter a nickname first!'); return; }
            if (!code || code.length < 4) { showError('Enter a valid room code!'); return; }
            localStorage.setItem('wp-nickname', nickname);
            window.location.href = '/room/' + code + '?name=' + encodeURIComponent(nickname);
        }

        function showError(msg) {
            const el = document.getElementById('errorMsg');
            el.textContent = msg;
            setTimeout(() => el.textContent = '', 3000);
        }

        // Restore nickname
        const saved = localStorage.getItem('wp-nickname');
        if (saved) document.getElementById('nickname').value = saved;

        // Enter key shortcuts
        document.getElementById('nickname').addEventListener('keydown', (e) => {
            if (e.key === 'Enter') document.getElementById('roomCode').focus();
        });
        document.getElementById('roomCode').addEventListener('keydown', (e) => {
            if (e.key === 'Enter') joinRoom();
        });
    </script>
</body>

</html>
